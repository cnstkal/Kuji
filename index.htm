.ct-B{background:linear-gradient(180deg,#f5f5f5 0%,#fff 60%)}.ct-C{background:linear-gradient(180deg,#fff3ea 0%,#fff 60%)}.ct-D{background:linear-gradient(180deg,#eff6ff 0%,#fff 60%)}.ct-E{background:linear-gradient(180deg,#f0fdf4 0%,#fff 60%)}.ct-미스터리{background:linear-gradient(180deg,#faf5ff 0%,#fff 60%)}.ct-디지털{background:linear-gradient(180deg,#ecfdf5 0%,#fff 60%)}@media(max-width:720px){.prizes-grid{grid-template-columns:repeat(2,minmax(0,1fr))}#prizes{padding-left:1rem;padding-right:1rem}.prize-info{padding:.75rem}.prize-desc{display:none}nav{padding:0 1rem}.nav-links a{display:none}}@media(max-width:420px){.prizes-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:.7rem}.draw-btn{padding:18px 44px;font-size:1.45rem}}

<body>

<div class="deco" style="top:15%;left:5%;animation-delay:.5s">🌸</div><div class="deco" style="top:30%;right:4%;animation-delay:1s;font-size:1.4rem">⭐</div><div class="deco" style="top:58%;left:3%;animation-delay:1.8s;font-size:1.2rem">💫</div><div class="deco" style="top:72%;right:5%;animation-delay:.3s">🎀</div>

<section id="draw"><div class="hero-chip">🎊 LUCKY KUJI · 오늘의 운</div><h1 class="hero-title">굿즈를 뽑아봐요!</h1><p class="hero-sub">과연 어떤 굿즈가 나올까? 두근두근 🫶</p><div class="count-pill">🎁 등록된 상품 <strong id="totalCount">0</strong>개</div><div><button class="draw-btn" onclick="drawPrize()">🪙 DRAW!</button></div><p class="draw-note">총 <strong id="availableCount">0</strong>개 중 랜덤 뽑기</p><div class="grade-summary"><p class="grade-summary-label">✦ 등급별 보유 수량</p><div class="grade-pills" id="gradePills"></div></div></section>

<div class="modal-overlay" id="adminModal"><div class="modal"><div class="modal-head"><span class="modal-title" id="adminTitle">🛠 상품 관리</span><button class="modal-close" onclick="closeAdmin()">×</button></div><div class="form-group"><label class="form-label">상품 이미지 (무제한)</label><div class="img-upload-area"><input type="file" id="imgInput" accept="image/*" multiple onchange="handleImg(event)"><div class="ua-icon">📷</div><p>클릭하여 이미지 추가</p><small>수정 시 새 이미지를 선택하지 않으면 기존 이미지 유지</small></div><div class="img-preview-list" id="imgPreviewList"></div></div><div class="form-group"><label class="form-label">등급</label><div class="grade-grid"><input type="radio" name="grade" id="gA" value="A" class="grade-radio" checked><label for="gA">🥇 A상</label><input type="radio" name="grade" id="gB" value="B" class="grade-radio"><label for="gB">🥈 B상</label><input type="radio" name="grade" id="gC" value="C" class="grade-radio"><label for="gC">🥉 C상</label><input type="radio" name="grade" id="gD" value="D" class="grade-radio"><label for="gD">💙 D상</label><input type="radio" name="grade" id="gE" value="E" class="grade-radio"><label for="gE">💚 E상</label><input type="radio" name="grade" id="gM" value="미스터리" class="grade-radio"><label for="gM">🔮 미스터리상</label><input type="radio" name="grade" id="gDG" value="디지털" class="grade-radio"><label for="gDG">💻 디지털상</label></div></div><div class="form-group"><label class="form-label">상품명</label><input type="text" id="prizeName" class="form-control" placeholder="예: 한정판 아크릴 스탠드"></div><div class="form-group"><label class="form-label">상품 설명</label><textarea id="prizeDesc" class="form-control" placeholder="상품 설명을 입력하세요"></textarea></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem"><div class="form-group"><label class="form-label">수량</label><input type="number" id="prizeQty" class="form-control" value="1" min="0"></div><div class="form-group"><label class="form-label">확률 가중치</label><input type="number" id="prizeWeight" class="form-control" value="1" min="1"></div></div><div class="btn-row"><button class="btn btn-primary" id="saveBtn" onclick="savePrize()">✅ 저장</button><button class="btn btn-secondary" onclick="resetForm()">↩ 초기화</button><button class="btn btn-danger" onclick="clearAll()">🗑 전체 삭제</button></div><div style="margin-top:1.5rem"><p style="font-size:.72rem;font-weight:900;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem">📋 등록된 상품 목록</p><div class="manage-list" id="manageList"></div></div></div></div>

<script>
const PK='luckyKuji_v3_prizes',HK='luckyKuji_v3_history';let prizes=[],history=[],pendingImgs=[],editingId=null;const EMOJI={A:'🥇',B:'🥈',C:'🥉',D:'💙',E:'💚','미스터리':'🔮','디지털':'💻'};const GRADES=['A','B','C','D','E','미스터리','디지털'];
function load(){try{prizes=JSON.parse(localStorage.getItem(PK)||'[]');history=JSON.parse(localStorage.getItem(HK)||'[]')}catch(e){prizes=[];history=[]}renderAll()}
function save(){localStorage.setItem(PK,JSON.stringify(prizes));localStorage.setItem(HK,JSON.stringify(history))}
function sortedPrizes(){return [...prizes].sort((a,b)=>{let ga=GRADES.indexOf(a.grade),gb=GRADES.indexOf(b.grade);if(ga!==gb)return ga-gb;return String(a.name||'').localeCompare(String(b.name||''),'ko-KR')})}
function renderAll(){renderPrizes();renderManage();renderHistory();renderCounts()}
function renderCounts(){let total=prizes.reduce((s,p)=>s+(+p.qty||0),0);document.getElementById('totalCount').textContent=prizes.length;document.getElementById('availableCount').textContent=total;let html=GRADES.map(g=>{let c=prizes.filter(p=>p.grade===g).reduce((s,p)=>s+(+p.qty||0),0);return `<div class="grade-pill"><span class="gp-dot dot-${g}"></span>${EMOJI[g]} ${g} <span class="gp-count">${c}</span></div>`}).join('');document.getElementById('gradePills').innerHTML=html}
function imgHtml(p,cls=''){return p.imgs&&p.imgs[0]?`<img class="${cls}" src="${p.imgs[0]}" alt="">`:`<div class="no-img">${EMOJI[p.grade]||'🎁'}</div>`}
function renderPrizes(){let box=document.getElementById('prizesGrid');if(!prizes.length){box.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="e-icon">🎁</div><p>아직 등록된 상품이 없어요.<br>관리자에서 상품을 추가해 주세요.</p></div>';return}box.innerHTML=sortedPrizes().map(p=>`<div class="prize-card ct-${p.grade}"><div class="prize-img-wrap">${imgHtml(p)}</div><div class="prize-info"><span class="prize-badge gc-${p.grade}">${EMOJI[p.grade]} ${p.grade}</span><div class="prize-name">${escapeHtml(p.name)}</div><div class="prize-desc">${escapeHtml(p.desc||'')}</div><div class="prize-foot"><span class="prize-qty">수량 ${p.qty}</span><span class="prize-weight">확률 x${p.weight}</span></div></div>${(+p.qty||0)<=0?'<div class="sold-overlay"><span class="sold-tag">SOLD OUT</span></div>':''}</div>`).join('')}
function renderManage(){let box=document.getElementById('manageList');if(!prizes.length){box.innerHTML='<div class="empty-state"><p>등록된 상품이 없습니다.</p></div>';return}box.innerHTML=sortedPrizes().map(p=>`<div class="manage-item">${p.imgs&&p.imgs[0]?`<img src="${p.imgs[0]}" alt="">`:`<div class="mi-icon">${EMOJI[p.grade]}</div>`}<div class="mi-info"><div class="mi-name">${escapeHtml(p.name)}</div><div class="mi-meta">${p.grade}상 · 수량 ${p.qty} · 확률 x${p.weight}</div></div><div class="mi-actions"><button class="mi-edit" onclick="editPrize('${p.id}')">수정</button><button class="mi-del" onclick="deletePrize('${p.id}')">삭제</button></div></div>`).join('')}
function renderHistory(){let box=document.getElementById('historyList');if(!history.length){box.innerHTML='<div class="empty-state"><div class="e-icon">📜</div><p>아직 당첨 내역이 없어요.</p></div>';return}box.innerHTML=history.slice(0,10).map(h=>`<div class="history-item">${h.img?`<img src="${h.img}" alt="">`:`<div class="hi-icon">${EMOJI[h.grade]}</div>`}<div class="hi-info"><div class="hi-name">${escapeHtml(h.name)}</div><div class="hi-time">${h.time}</div></div><span class="hi-badge gc-${h.grade}">${h.grade}</span></div>`).join('')}
function openAdmin(){document.getElementById('adminModal').classList.add('show');renderManage()}function closeAdmin(){document.getElementById('adminModal').classList.remove('show')}
function closeResult(){document.getElementById('resultModal').classList.remove('show')}
function handleImg(e){[...e.target.files].forEach(file=>{let r=new FileReader();r.onload=ev=>{pendingImgs.push(ev.target.result);renderImgPreview()};r.readAsDataURL(file)})}
function renderImgPreview(){document.getElementById('imgPreviewList').innerHTML=pendingImgs.map((src,i)=>`<div class="img-preview-item"><img src="${src}"><button class="rm-btn" onclick="removeImg(${i})">×</button></div>`).join('')}
function removeImg(i){pendingImgs.splice(i,1);renderImgPreview()}
function savePrize(){let name=document.getElementById('prizeName').value.trim();if(!name){alert('상품명을 입력해 주세요');return}let grade=document.querySelector('input[name="grade"]:checked').value;let desc=document.getElementById('prizeDesc').value.trim();let qty=Math.max(0,parseInt(document.getElementById('prizeQty').value||'0',10));let weight=Math.max(1,parseInt(document.getElementById('prizeWeight').value||'1',10));if(editingId){let p=prizes.find(x=>x.id===editingId);if(p){p.grade=grade;p.name=name;p.desc=desc;p.qty=qty;p.weight=weight;if(pendingImgs.length)p.imgs=[...pendingImgs]}}else{prizes.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2),grade,name,desc,qty,weight,imgs:[...pendingImgs]})}save();resetForm();renderAll()}
function editPrize(id){let p=prizes.find(x=>x.id===id);if(!p)return;editingId=id;document.getElementById('adminTitle').textContent='✏️ 상품 수정';document.getElementById('saveBtn').textContent='✅ 수정 저장';document.getElementById('prizeName').value=p.name||'';document.getElementById('prizeDesc').value=p.desc||'';document.getElementById('prizeQty').value=p.qty||0;document.getElementById('prizeWeight').value=p.weight||1;let radio=document.querySelector(`input[name="grade"][value="${p.grade}"]`);if(radio)radio.checked=true;pendingImgs=[...(p.imgs||[])];renderImgPreview();document.querySelector('#adminModal .modal').scrollTop=0}
function resetForm(){editingId=null;document.getElementById('adminTitle').textContent='🛠 상품 관리';document.getElementById('saveBtn').textContent='✅ 저장';document.getElementById('prizeName').value='';document.getElementById('prizeDesc').value='';document.getElementById('prizeQty').value=1;document.getElementById('prizeWeight').value=1;document.getElementById('gA').checked=true;pendingImgs=[];document.getElementById('imgInput').value='';renderImgPreview()}
function deletePrize(id){if(!confirm('이 상품을 삭제할까요?'))return;prizes=prizes.filter(p=>p.id!==id);if(editingId===id)resetForm();save();renderAll()}
function clearAll(){if(!confirm('전체 상품과 당첨 내역을 삭제할까요?'))return;prizes=[];history=[];resetForm();save();renderAll()}
function drawPrize(){let pool=[];prizes.forEach(p=>{let qty=+p.qty||0,w=+p.weight||1;if(qty>0)for(let i=0;i<w;i++)pool.push(p)});if(!pool.length){alert('뽑을 수 있는 상품이 없어요');return}let p=pool[Math.floor(Math.random()*pool.length)];p.qty=Math.max(0,(+p.qty||0)-1);let h={name:p.name,grade:p.grade,img:p.imgs&&p.imgs[0]?p.imgs[0]:'',time:new Date().toLocaleString('ko-KR')};history.unshift(h);history=history.slice(0,30);save();renderAll();document.getElementById('resultContent').innerHTML=`<div class="result-badge gc-${p.grade}">${EMOJI[p.grade]} ${p.grade}</div>${h.img?`<img class="result-img" src="${h.img}" alt="">`:`<div class="result-icon">${EMOJI[p.grade]}</div>`}<div class="result-name">${escapeHtml(p.name)}</div><div class="result-desc">${escapeHtml(p.desc||'당첨을 축하합니다!')}</div>`;document.getElementById('resultModal').classList.add('show');confetti()}
function escapeHtml(s){return String(s||'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[m]))}
function confetti(){let c=document.getElementById('confetti-canvas'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;let arr=Array.from({length:90},()=>({x:Math.random()*c.width,y:-20-Math.random()*c.height,r:3+Math.random()*5,v:2+Math.random()*4,a:Math.random()*6}));let t=0;function loop(){ctx.clearRect(0,0,c.width,c.height);arr.forEach(o=>{o.y+=o.v;o.x+=Math.sin(o.a+t/10)*2;ctx.fillStyle=['#ff6eb4','#ffe066','#5ee8c8','#c4b5fd','#ff8c6b'][Math.floor(Math.random()*5)];ctx.fillRect(o.x,o.y,o.r,o.r)});if(t++<90)requestAnimationFrame(loop);else ctx.clearRect(0,0,c.width,c.height)}loop()}
load();
</script>
</body>
</html>
