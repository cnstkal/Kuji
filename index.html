<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LUCKY KUJI</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#faf7f3;
color:#222;
}

/* 🔥 상단 헤더 */
.header{
position:sticky;
top:0;
background:#faf7f3;
padding:16px;
z-index:10;
transition:.3s;
}

/* 스크롤하면 숨김 */
.header.hide{
transform:translateY(-100%);
opacity:0;
}

/* 로고 */
.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo-box{
width:50px;
height:50px;
border-radius:16px;
background:linear-gradient(135deg,#ffb86c,#ff6fb5);
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:22px;
}

/* 버튼 */
.menu{
display:flex;
gap:10px;
margin-top:14px;
}

.menu button{
flex:1;
padding:14px;
border-radius:30px;
border:none;
background:#fff;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
font-weight:700;
}

/* 본문 여백 넉넉하게 */
.container{
padding:20px;
max-width:600px;
margin:auto;
}

/* DRAW 버튼 */
.draw{
width:140px;
height:140px;
border-radius:50%;
background:linear-gradient(135deg,#ffd86b,#ff6fb5);
font-size:22px;
margin:30px auto;
display:block;
}

/* 결과 */
.result{
text-align:center;
margin-top:30px;
}

.result img{
width:200px;
border-radius:16px;
margin-top:10px;
}

/* 관리자 */
.admin{
display:none;
margin-top:30px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
}

/* 카드 여백 */
.card{
background:#fff;
padding:16px;
border-radius:16px;
margin-top:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="header" id="header">
  <div class="logo">
    <div class="logo-box">K</div>
    <div>
      <h2 style="margin:0">LUCKY KUJI</h2>
      <div style="font-size:13px;color:#777">랜덤 굿즈 온라인 쿠지</div>
    </div>
  </div>

  <div class="menu">
    <button onclick="scrollToSection('draw')">뽑기</button>
    <button onclick="scrollToSection('list')">상품</button>
    <button onclick="login()">관리자</button>
  </div>
</div>

<div class="container">

<!-- 뽑기 -->
<div id="draw">
<button class="draw" onclick="draw()">DRAW</button>
</div>

<div class="result" id="result"></div>

<!-- 상품 리스트 -->
<div id="list" class="card"></div>

<!-- 관리자 -->
<div class="admin" id="admin">
  <div class="card">
    <h3>상품 추가</h3>
    <input id="name" placeholder="상품 이름">
    <input id="rank" placeholder="등급">
    <input type="file" id="img">
    <button onclick="add()">추가</button>
  </div>
</div>

</div>

<script>
let items = JSON.parse(localStorage.getItem("items")||"[]")

function save(){
localStorage.setItem("items",JSON.stringify(items))
}

function render(){
let html=""
items.forEach(i=>{
html+=`<div>${i.rank} - ${i.name}</div>`
})
document.getElementById("list").innerHTML=html
}

function add(){
let name=nameInput.value
let rank=rankInput.value
let file=img.files[0]

let reader=new FileReader()
reader.onload=function(){
items.push({name,rank,img:reader.result})
save()
render()
}
reader.readAsDataURL(file)
}

function login(){
let pw=prompt("비밀번호")
if(pw==="1230"){
admin.style.display="block"
}
}

function draw(){
if(items.length===0)return alert("상품 없음")

let pick=items[Math.floor(Math.random()*items.length)]

result.innerHTML=`
<h2>${pick.rank}</h2>
<h3>${pick.name}</h3>
<img src="${pick.img}">
`
}

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"})
}

/* 🔥 스크롤 시 헤더 숨김 */
let lastScroll=0
window.addEventListener("scroll",()=>{
let current=window.scrollY
if(current>lastScroll && current>80){
header.classList.add("hide")
}else{
header.classList.remove("hide")
}
lastScroll=current
})

render()
</script>

</body>
</html>
