<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"/>
<title>✦ IDOL KUJI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0F;--bg2:#12121A;--bg3:#1A1A26;--card:#1E1E2E;
  --border:#2A2A3E;--text:#F0F0FF;--sub:#8888AA;--accent:#38BDF8;
  --accent2:#22D3EE;--btn-grad:linear-gradient(135deg,#38BDF8,#22D3EE);
}
body.light{
  --bg:#F5F5FA;--bg2:#EBEBF5;--bg3:#E0E0EF;--card:#FFFFFF;
  --border:#D0D0E0;--text:#1A1A2E;--sub:#66668A;--accent:#0284C7;
  --accent2:#0891B2;--btn-grad:linear-gradient(135deg,#0284C7,#0891B2);
}
html{touch-action:pan-y;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit','Noto Sans KR',sans-serif;min-height:100vh;transition:background .3s,color .3s;touch-action:pan-y;overflow-x:hidden;overscroll-behavior-x:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pop{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes glow-ssr{0%,100%{box-shadow:0 0 20px #FFD70080}50%{box-shadow:0 0 40px #FFD700,0 0 60px #FFD70080}}
@keyframes glow-sr{0%,100%{box-shadow:0 0 20px #C084FC80}50%{box-shadow:0 0 40px #C084FC,0 0 60px #C084FC80}}
@keyframes glow-r{0%,100%{box-shadow:0 0 20px #60A5FA80}50%{box-shadow:0 0 40px #60A5FA,0 0 60px #60A5FA80}}
@keyframes glow-n{0%,100%{box-shadow:0 0 10px #94A3B840}50%{box-shadow:0 0 20px #94A3B880}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes cardReveal{0%{transform:rotateY(0deg) scale(1)}50%{transform:rotateY(90deg) scale(1.08)}100%{transform:rotateY(0deg) scale(1)}}

.fade-in{animation:fadeIn .4s ease}

/* Header */
header{
  position:sticky;top:0;z-index:100;
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;
}
.logo{
  font-size:1.2rem;font-weight:800;
  background:linear-gradient(135deg,#38BDF8,#22D3EE);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
nav{display:flex;gap:4px}
.nav-btn{
  padding:6px 14px;border-radius:20px;border:none;cursor:pointer;
  font-size:0.8rem;font-weight:600;letter-spacing:.05em;
  background:transparent;color:var(--sub);transition:all .2s;font-family:inherit;
}
.nav-btn.active{background:var(--btn-grad);color:#fff}
.nav-btn.admin-active{background:linear-gradient(135deg,#FF6B6B,#FFD700);color:#000}
.icon-btn{
  width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:var(--card);cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
}
.text-btn{
  padding:4px 10px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--sub);cursor:pointer;font-size:0.7rem;font-family:inherit;
}
.logout-btn{
  padding:4px 10px;border-radius:20px;border:1px solid #FF6B6B44;
  background:#FF6B6B22;color:#FF6B6B;cursor:pointer;font-size:0.7rem;font-family:inherit;
}
.header-right{display:flex;gap:8px;align-items:center}

/* Tabs */
.tab{display:none}.tab.active{display:block}

/* Main container */
.main{max-width:640px;margin:0 auto;padding:32px 20px}

/* Draw tab */
.kuji-title-area{text-align:center;margin-bottom:32px}
.kuji-eyebrow{
  font-size:.75rem;letter-spacing:.3em;color:var(--accent);
  font-weight:600;margin-bottom:8px;text-transform:uppercase;
}
.kuji-title{
  font-size:2.2rem;font-weight:800;letter-spacing:.05em;
  background:linear-gradient(135deg,#38BDF8 30%,#22D3EE);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;
}
.draw-limit-badge{
  display:inline-block;padding:4px 14px;border-radius:20px;
  background:var(--card);border:1px solid var(--border);
  font-size:.78rem;color:var(--sub);
}
.draw-limit-badge span{color:var(--accent);font-weight:700}

/* Grade summary */
.grade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:28px}
.grade-card{
  background:var(--card);border-radius:12px;
  padding:10px 6px;text-align:center;
}
.grade-label{font-size:.6rem;font-weight:700;letter-spacing:.1em;margin-bottom:4px}
.grade-count{font-size:1rem;font-weight:700;color:var(--text)}
.grade-sub{font-size:.55rem;color:var(--sub)}

/* Count selector */
.count-label{font-size:.78rem;color:var(--sub);margin-bottom:10px;text-align:center}
.count-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.count-btn{
  padding:10px 20px;border-radius:12px;cursor:pointer;
  font-weight:700;font-size:.9rem;transition:all .2s;min-width:60px;
  font-family:inherit;
}
.count-btn.active{background:var(--btn-grad);color:#fff;border:1px solid transparent}
.count-btn.inactive{background:var(--card);color:var(--text);border:1px solid var(--border)}

/* Draw button */
.draw-btn-wrap{text-align:center;margin-bottom:32px}
.draw-btn{
  padding:16px 48px;border-radius:50px;border:none;cursor:pointer;
  background:var(--btn-grad);color:#fff;font-size:1.1rem;font-weight:800;
  letter-spacing:.1em;box-shadow:0 0 30px rgba(56,189,248,.4);
  transition:all .3s;font-family:inherit;display:inline-flex;align-items:center;gap:10px;
}
.draw-btn:disabled{background:var(--border);box-shadow:none;cursor:not-allowed;transform:scale(.97)}
.spinner{
  width:18px;height:18px;border:2px solid #fff;border-top:2px solid transparent;
  border-radius:50%;animation:spin 1s linear infinite;display:inline-block;
}

/* Results */
#results-area{margin-bottom:24px}
.results-grid{gap:12px;margin-bottom:16px}
.result-summary{
  background:var(--card);border-radius:16px;padding:16px;
  border:1px solid var(--border);text-align:center;
}
.result-summary-title{font-size:.75rem;color:var(--sub);margin-bottom:10px}
.result-tags{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.result-tag{
  padding:4px 12px;border-radius:20px;
  font-size:.78rem;font-weight:700;
}

/* Kuji Card */
.kuji-card-wrap{perspective:800px;border-radius:16px}
.kuji-card-wrap.glow-ssr{animation:glow-ssr 2s infinite}
.kuji-card-wrap.glow-sr{animation:glow-sr 2s infinite}
.kuji-card-wrap.glow-r{animation:glow-r 2s infinite}
.kuji-card-wrap.glow-n{animation:glow-n 2s infinite}
.kuji-card-inner{
  width:100%;padding-top:140%;position:relative;
  transform-style:preserve-3d;
  transition:transform 0.6s cubic-bezier(.4,0,.2,1);
}
.kuji-card-inner.flipped{transform:rotateY(180deg)}
.kuji-card-face{
  position:absolute;inset:0;backface-visibility:hidden;
  border-radius:16px;overflow:hidden;
}
.kuji-card-back{
  background:linear-gradient(135deg,#38BDF822,#22D3EE22);
  border:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.kuji-card-back-icon{font-size:2rem;margin-bottom:8px;animation:float 2s ease-in-out infinite}
.kuji-card-back-label{color:var(--sub);font-size:.75rem;letter-spacing:.1em}
.kuji-shimmer{
  position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 40%,rgba(56,189,248,.08) 50%,transparent 60%);
  background-size:200% 200%;animation:shimmer 2s infinite;
}
.kuji-card-front{
  transform:rotateY(180deg);
  display:flex;flex-direction:column;
}
.kuji-card-front.popped{animation:pop .4s ease}
.grade-badge{
  position:absolute;top:8px;right:8px;
  font-size:.6rem;font-weight:700;letter-spacing:.1em;
  padding:2px 8px;border-radius:20px;color:#000;z-index:1;
}
.kuji-img{width:100%;height:60%;object-fit:cover;flex-shrink:0}
.kuji-no-img{
  height:60%;display:flex;align-items:center;justify-content:center;
  font-size:3rem;flex-shrink:0;
}
.kuji-card-info{padding:10px;flex:1;display:flex;flex-direction:column;justify-content:center}
.kuji-card-name{font-size:.8rem;font-weight:700;margin-bottom:4px;word-break:break-all;line-height:1.3}
.kuji-card-desc{font-size:.65rem;color:var(--sub);line-height:1.4;word-break:break-all}

/* Reset btn */
.reset-wrap{text-align:center;margin-top:40px}
.reset-btn{
  padding:8px 20px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--sub);cursor:pointer;font-size:.78rem;
  transition:all .2s;font-family:inherit;
}
.reset-btn:hover{color:var(--text);border-color:var(--sub)}

/* Collection */
.col-header{margin-bottom:24px}
.col-header h2{font-weight:800;font-size:1.5rem;margin-bottom:4px}
.col-header .sub{color:var(--sub);font-size:.85rem}
.col-empty{
  text-align:center;padding:80px 20px;color:var(--sub);
  background:var(--card);border-radius:20px;border:1px solid var(--border);
}
.col-empty-icon{font-size:3rem;margin-bottom:12px}
.col-empty-title{font-weight:600;margin-bottom:4px}
.col-empty-sub{font-size:.8rem}
.col-stats{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.col-stat-tag{padding:8px 16px;border-radius:20px;font-size:.8rem;font-weight:700}
.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.col-item{
  background:var(--card);border-radius:16px;overflow:hidden;
  transition:transform .2s;cursor:default;
}
.col-item:hover{transform:translateY(-4px)}
.col-item-img{width:100%;height:120px;object-fit:cover}
.col-item-no-img{
  height:120px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;
}
.col-item-body{padding:10px}
.col-item-grade{font-size:.58rem;font-weight:700;letter-spacing:.1em;margin-bottom:4px}
.col-item-name{font-size:.8rem;font-weight:600;color:var(--text);word-break:break-all;line-height:1.3}

/* Admin */
.admin-title{
  font-weight:800;font-size:1.5rem;margin-bottom:24px;
  background:linear-gradient(135deg,#FF6B6B,#FFD700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.admin-card{
  background:var(--card);border-radius:20px;padding:24px;
  border:1px solid var(--border);margin-bottom:24px;
}
.admin-card-title{font-weight:700;margin-bottom:16px;font-size:.9rem;color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-field{margin-bottom:12px}
.field-label{font-size:.75rem;color:var(--sub);margin-bottom:6px}
.field-input{
  width:100%;padding:10px 14px;border-radius:10px;
  border:1px solid var(--border);background:var(--bg2);
  color:var(--text);font-size:.9rem;outline:none;font-family:inherit;
}
.field-input:focus{border-color:var(--accent)}
select.field-input{cursor:pointer}
.save-btn{
  padding:10px 24px;border-radius:10px;border:none;
  background:var(--btn-grad);color:#fff;font-weight:700;cursor:pointer;font-size:.85rem;font-family:inherit;
}
.cancel-btn{
  padding:10px 20px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--sub);cursor:pointer;font-size:.85rem;font-family:inherit;
}
.upload-btn{
  padding:10px 20px;border-radius:10px;border:1px dashed var(--border);
  background:var(--bg2);color:var(--text);cursor:pointer;font-size:.85rem;font-family:inherit;
}
.image-preview{width:48px;height:48px;object-fit:cover;border-radius:8px}
.del-img-btn{background:none;border:none;color:#FF6B6B;cursor:pointer;font-size:.8rem;font-family:inherit}
.product-list{display:flex;flex-direction:column;gap:10px}
.product-item{
  display:flex;align-items:center;gap:12px;
  background:var(--bg2);border-radius:12px;padding:12px;
}
.product-thumb{width:48px;height:48px;object-fit:cover;border-radius:8px;flex-shrink:0}
.product-no-thumb{
  width:48px;height:48px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;
}
.product-info{flex:1;min-width:0}
.product-name-row{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.product-grade-badge{
  font-size:.6rem;font-weight:700;
  padding:2px 6px;border-radius:10px;flex-shrink:0;
}
.product-name{font-size:.85rem;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-meta{font-size:.72rem;color:var(--sub)}
.product-actions{display:flex;gap:6px;flex-shrink:0}
.edit-btn{
  padding:6px 12px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--text);cursor:pointer;font-size:.75rem;font-family:inherit;
}
.del-btn{
  padding:6px 12px;border-radius:8px;border:1px solid #FF6B6B44;
  background:#FF6B6B22;color:#FF6B6B;cursor:pointer;font-size:.75rem;font-family:inherit;
}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:flex;align-items:center;justify-content:center;
}
.modal-box{
  background:var(--card);border-radius:20px;padding:32px;width:300px;
  border:1px solid var(--border);animation:pop .3s ease;
}
.modal-title{font-weight:700;font-size:1.1rem;margin-bottom:20px;text-align:center}
.modal-input{
  width:100%;padding:12px 16px;border-radius:12px;
  border:1px solid var(--border);background:var(--bg2);
  color:var(--text);font-size:.9rem;margin-bottom:12px;outline:none;font-family:inherit;
}
.modal-btn{
  width:100%;padding:12px;border-radius:12px;border:none;
  background:var(--btn-grad);color:#fff;font-weight:700;cursor:pointer;font-size:.9rem;font-family:inherit;
}

/* Loading */
#loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite}
.loading-text{color:var(--sub);font-size:.85rem}

/* Confetti */
#confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">✦ KUJI</div>
  <nav>
    <button class="nav-btn active" id="nav-draw" onclick="switchTab('draw')">뽑기</button>
    <button class="nav-btn" id="nav-collection" onclick="switchTab('collection')">컬렉션</button>
    <button class="nav-btn" id="nav-admin" style="display:none" onclick="switchTab('admin')">관리자</button>
  </nav>
  <div class="header-right">
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">☀️</button>
    <button class="text-btn" id="admin-login-btn" onclick="showAdminLogin()">관리자</button>
    <button class="logout-btn" id="admin-logout-btn" style="display:none" onclick="adminLogout()">로그아웃</button>
  </div>
</header>

<!-- Admin Login Modal -->
<div class="modal-overlay" id="admin-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box">
    <div class="modal-title">관리자 로그인</div>
    <input type="password" class="modal-input" id="admin-pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    <button class="modal-btn" onclick="doAdminLogin()">로그인</button>
  </div>
</div>

<!-- Confetti -->
<div id="confetti-container"></div>

<!-- Loading -->
<div id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">로딩 중...</div>
</div>

<!-- Draw Tab -->
<div class="tab" id="tab-draw" style="display:none">
  <div class="main fade-in">
    <div class="kuji-title-area">
      <div class="kuji-eyebrow" id="kuji-subtitle">당신의 운명을 뽑아보세요</div>
      <h1 class="kuji-title" id="kuji-title">IDOL KUJI</h1>
      <div class="draw-limit-badge" id="draw-limit-badge" style="display:none">
        내 뽑기: <span id="drawn-count">0</span> / <span id="max-draws">0</span>
      </div>
    </div>
    <div class="grade-grid" id="grade-grid"></div>
    <div class="count-label">뽑기 수 선택</div>
    <div class="count-btns">
      <button class="count-btn active" data-count="1" onclick="selectCount(1)">1개</button>
      <button class="count-btn inactive" data-count="3" onclick="selectCount(3)">3개</button>
      <button class="count-btn inactive" data-count="5" onclick="selectCount(5)">5개</button>
      <button class="count-btn inactive" data-count="10" onclick="selectCount(10)">10개</button>
    </div>
    <div class="draw-btn-wrap">
      <button class="draw-btn" id="draw-btn" onclick="handleDraw()">✦ <span id="draw-btn-label">1개 뽑기</span></button>
    </div>
    <div id="results-area" style="display:none" class="fade-in">
      <div class="results-grid" id="results-grid"></div>
      <div class="result-summary">
        <div class="result-summary-title">이번 결과</div>
        <div class="result-tags" id="result-tags"></div>
      </div>
    </div>
    <div class="reset-wrap">
      <button class="reset-btn" onclick="handleReset()">🔄 초기화</button>
    </div>
  </div>
</div>

<!-- Collection Tab -->
<div class="tab" id="tab-collection" style="display:none">
  <div class="main fade-in">
    <div class="col-header">
      <h2>내 컬렉션</h2>
      <div class="sub" id="col-count">총 0개 보유</div>
    </div>
    <div id="col-empty" class="col-empty" style="display:none">
      <div class="col-empty-icon">🎴</div>
      <div class="col-empty-title">아직 뽑은 상품이 없어요</div>
      <div class="col-empty-sub">뽑기 탭에서 시작해보세요!</div>
    </div>
    <div id="col-content" style="display:none">
      <div class="col-stats" id="col-stats"></div>
      <div class="col-grid" id="col-grid"></div>
    </div>
  </div>
</div>

<!-- Admin Tab -->
<div class="tab" id="tab-admin" style="display:none">
  <div class="main fade-in" style="max-width:800px">
    <div class="admin-title">관리자 패널</div>

    <!-- Settings -->
    <div class="admin-card">
      <div class="admin-card-title">⚙️ 쿠지 설정</div>
      <div class="form-grid">
        <div>
          <div class="field-label">쿠지 제목</div>
          <input class="field-input" id="s-title" value="IDOL KUJI"/>
        </div>
        <div>
          <div class="field-label">서브타이틀</div>
          <input class="field-input" id="s-subtitle" value="당신의 운명을 뽑아보세요"/>
        </div>
      </div>
      <div class="form-field">
        <div class="field-label">인당 최대 뽑기 횟수 (0 = 무제한)</div>
        <input type="number" min="0" class="field-input" id="s-max" value="0" style="width:160px"/>
      </div>
      <button class="save-btn" onclick="saveSettings()">저장</button>
    </div>

    <!-- Add / Edit product -->
    <div class="admin-card">
      <div class="admin-card-title" id="form-title">➕ 상품 추가</div>
      <div class="form-grid">
        <div>
          <div class="field-label">상품명</div>
          <input class="field-input" id="f-name" placeholder="예: 포토카드 세트"/>
        </div>
        <div>
          <div class="field-label">등급</div>
          <select class="field-input" id="f-grade">
            <option value="SSR">SSR</option>
            <option value="SR">SR</option>
            <option value="R" selected>R</option>
            <option value="N">N</option>
          </select>
        </div>
        <div>
          <div class="field-label">확률 가중치 (높을수록 자주 나옴)</div>
          <input type="number" min="1" class="field-input" id="f-rate" value="10"/>
        </div>
        <div>

          <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)"/>
          <img id="img-preview" class="image-preview" style="display:none"/>

    <!-- Product list -->

        <div style="color:var(--sub);text-align:center;padding:20px">상품을 추가해주세요</div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase + App Script -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc,
  updateDoc, deleteDoc, setDoc, getDoc, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ── Firebase init ──
const firebaseConfig = {
  apiKey: "AIzaSyAA6mbdYfLrrgCJjN47PX91_mU7I53RiBs",
  authDomain: "site-c67b4.firebaseapp.com",
  projectId: "site-c67b4",
  storageBucket: "site-c67b4.firebasestorage.app",
  messagingSenderId: "744761377245",
  appId: "1:744761377245:web:3ddaee14f184716eeef634"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ── Cloudinary ──
const CLOUD = "dbljkloal";
const PRESET = "Everything";

// ── Grade meta ──
const GRADE_META = {
  SSR: { color: "#FFD700", glow: "glow-ssr", bg: "#FFD70022" },
  SR:  { color: "#C084FC", glow: "glow-sr",  bg: "#C084FC22" },
  R:   { color: "#60A5FA", glow: "glow-r",   bg: "#60A5FA22" },
  N:   { color: "#94A3B8", glow: "glow-n",   bg: "#94A3B822" },
};

// ── State ──
let products = [];
let settings = { maxPerUser: 0, title: "IDOL KUJI", subtitle: "당신의 운명을 뽑아보세요" };
let userDraws = [];
let drawCount = 1;
let currentResults = [];
let editId = null;
let currentImageUrl = "";
let isDrawing = false;
let isAdmin = false;
const ADMIN_PW = "2026";

// ── User ID ──
let userId = localStorage.getItem("kuji_uid");
if (!userId) {
  userId = `user_${Date.now()}_${Math.random().toString(36).slice(2)}`;
  localStorage.setItem("kuji_uid", userId);
}

// ── Expose globals ──
window.switchTab = switchTab;
window.toggleTheme = toggleTheme;
window.showAdminLogin = showAdminLogin;
window.doAdminLogin = doAdminLogin;
window.adminLogout = adminLogout;
window.selectCount = selectCount;
window.handleDraw = handleDraw;
window.handleReset = handleReset;
window.saveSettings = saveSettings;
window.saveProduct = saveProduct;
window.cancelEdit = cancelEdit;
window.clearImage = clearImage;
window.handleImageUpload = handleImageUpload;
window.editProduct = editProduct;
window.deleteProduct = deleteProduct;

// ── Helpers ──
function weightedDraw(items) {
  const pool = [];
  items.forEach(item => {
    const slots = item.remaining !== undefined ? item.remaining : (item.count || 1);
    if (slots <= 0) return;
    const w = Math.round((item.rate || 1) * 10);
    for (let i = 0; i < w; i++) pool.push(item);
  });
  if (!pool.length) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

// ── Load all data ──
async function loadAll() {
  try {
    const [pSnap, sSnap, dSnap] = await Promise.all([
      getDocs(query(collection(db, "products"), orderBy("grade"))),
      getDoc(doc(db, "settings", "global")),
      getDocs(query(collection(db, "draws", userId, "items"), orderBy("drawnAt", "desc")))
    ]);
    products = pSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (sSnap.exists()) Object.assign(settings, sSnap.data());
    userDraws = dSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) {
    console.error("loadAll error:", e);
    alert("데이터를 불러오지 못했어요.\n사유: " + (e && e.message ? e.message : e) + "\n\nFirestore 보안 규칙 또는 인덱스 설정을 확인해주세요.");
  }
}

// ── Disable zoom gestures (double-tap, pinch) ──
let lastTouchEnd = 0;
document.addEventListener("touchend", (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });
document.addEventListener("gesturestart", (e) => e.preventDefault());
document.addEventListener("gesturechange", (e) => e.preventDefault());

// ── Init ──
async function init() {
  await loadAll();
  document.getElementById("loading").style.display = "none";
  renderDrawTab();
  renderCollectionTab();
  if (isAdmin) renderAdminTab();
  switchTab("draw");
}
init();

// ── Theme ──
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.body.className = isDark ? "" : "light";
  document.getElementById("theme-btn").textContent = isDark ? "☀️" : "🌙";
}

// ── Tab switch ──
function switchTab(name) {
  ["draw","collection","admin"].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = "none";
    const nb = document.getElementById(`nav-${t}`);
    if (nb) { nb.className = "nav-btn"; }
  });
  document.getElementById(`tab-${name}`).style.display = "block";
  const nb = document.getElementById(`nav-${name}`);
  if (nb) nb.className = name === "admin" ? "nav-btn admin-active" : "nav-btn active";
  if (name === "collection") renderCollectionTab();
  if (name === "admin") renderAdminTab();
}

// ── Admin ──
function showAdminLogin() {
  document.getElementById("admin-modal").style.display = "flex";
  setTimeout(() => document.getElementById("admin-pw-input").focus(), 100);
}
function doAdminLogin() {
  const pw = document.getElementById("admin-pw-input").value;
  if (pw === ADMIN_PW) {
    isAdmin = true;
    document.getElementById("admin-modal").style.display = "none";
    document.getElementById("admin-pw-input").value = "";
    document.getElementById("nav-admin").style.display = "";
    document.getElementById("admin-login-btn").style.display = "none";
    document.getElementById("admin-logout-btn").style.display = "";

    switchTab("admin");
  } else {
    alert("비밀번호가 틀렸어요");
  }
}
function adminLogout() {
  isAdmin = false;
  document.getElementById("nav-admin").style.display = "none";
  document.getElementById("admin-login-btn").style.display = "";
  document.getElementById("admin-logout-btn").style.display = "none";
  // 관리자 탭을 보고 있었을 때만 뽑기 탭으로 전환, 그 외 화면은 그대로 유지
  const adminTabVisible = document.getElementById("tab-admin").style.display !== "none";
  if (adminTabVisible) switchTab("draw");
}

// ── Count selector ──
function selectCount(n) {
  drawCount = n;
  document.querySelectorAll(".count-btn").forEach(b => {
    b.className = "count-btn " + (parseInt(b.dataset.count) === n ? "active" : "inactive");
  });
  document.getElementById("draw-btn-label").textContent = `${n}개 뽑기`;
}

// ── Render draw tab ──
function renderDrawTab() {
  // Title
  document.getElementById("kuji-title").textContent = settings.title;
  document.getElementById("kuji-subtitle").textContent = settings.subtitle;
  // Settings in admin form
  document.getElementById("s-title").value = settings.title;
  document.getElementById("s-subtitle").value = settings.subtitle;
  document.getElementById("s-max").value = settings.maxPerUser || 0;

  // Limit badge
  const badge = document.getElementById("draw-limit-badge");
  if (settings.maxPerUser > 0) {
    badge.style.display = "";
    document.getElementById("drawn-count").textContent = userDraws.length;
    document.getElementById("max-draws").textContent = settings.maxPerUser;
  } else badge.style.display = "none";

  // Grade grid
  const gg = document.getElementById("grade-grid");
  gg.innerHTML = "";
  Object.entries(GRADE_META).forEach(([g, m]) => {
    const cnt = products.filter(p => p.grade === g && (p.remaining ?? p.count) > 0)
      .reduce((a, b) => a + (b.remaining ?? b.count), 0);
    const el = document.createElement("div");
    el.className = "grade-card";
    el.style.border = `1px solid ${m.color}44`;
    el.innerHTML = `
      <div class="grade-label" style="color:${m.color}">${g}</div>
      <div class="grade-count">${cnt}</div>
      <div class="grade-sub">남음</div>
    `;
    gg.appendChild(el);
  });
}

// ── Draw ──
async function handleDraw() {
  if (isDrawing) return;
  if (settings.maxPerUser > 0 && userDraws.length + drawCount > settings.maxPerUser) {
    alert(`최대 ${settings.maxPerUser}번 뽑을 수 있어요. 남은 횟수: ${settings.maxPerUser - userDraws.length}`);
    return;
  }
  const avail = products.filter(p => (p.remaining ?? p.count) > 0);
  if (!avail.length) { alert("남은 상품이 없어요!"); return; }

  isDrawing = true;
  const btn = document.getElementById("draw-btn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> 뽑는 중...`;
  document.getElementById("results-area").style.display = "none";

  await new Promise(r => setTimeout(r, 600));

  // Pick items
  const drawn = [];
  const used = {};
  const poolSnap = avail.map(p => ({ ...p }));

  for (let i = 0; i < drawCount; i++) {
    const eligible = poolSnap.map(p => ({
      ...p, remaining: (p.remaining ?? p.count) - (used[p.id] || 0)
    })).filter(p => p.remaining > 0);
    const pick = weightedDraw(eligible);
    if (!pick) break;
    drawn.push(pick);
    used[pick.id] = (used[pick.id] || 0) + 1;
  }

  // Update Firestore remaining
  await Promise.all(Object.entries(used).map(([id, cnt]) => {
    const p = products.find(x => x.id === id);
    const rem = (p.remaining ?? p.count) - cnt;
    return updateDoc(doc(db, "products", id), { remaining: rem });
  }));

  // Save user draws
  await Promise.all(drawn.map(item =>
    addDoc(collection(db, "draws", userId, "items"), {
      productId: item.id, name: item.name, grade: item.grade,
      imageUrl: item.imageUrl || "", drawnAt: Date.now()
    })
  ));

  currentResults = drawn;
  isDrawing = false;
  btn.disabled = false;
  btn.innerHTML = `✦ <span id="draw-btn-label">${drawCount}개 뽑기</span>`;

  await loadAll();
  renderDrawTab();
  renderResults(drawn);

  const hasRare = drawn.some(d => d.grade === "SSR" || d.grade === "SR");
  if (hasRare) launchConfetti();
}

// ── Render results ──
function renderResults(items) {
  const area = document.getElementById("results-area");
  const grid = document.getElementById("results-grid");
  area.style.display = "block";
  grid.innerHTML = "";

  const n = items.length;
  const cols = n <= 3 ? n : n <= 6 ? 3 : n <= 8 ? 4 : 5;
  grid.style.display = "grid";
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  items.forEach((item, i) => {
    const meta = GRADE_META[item.grade] || GRADE_META.N;
    const wrap = document.createElement("div");
    wrap.className = "kuji-card-wrap";
    wrap.style.borderRadius = "16px";

    const inner = document.createElement("div");
    inner.className = "kuji-card-inner";

    // Back face
    const back = document.createElement("div");
    back.className = "kuji-card-face kuji-card-back";
    back.innerHTML = `
      <div class="kuji-card-back-icon">🎴</div>
      <div class="kuji-card-back-label">KUJI</div>
      <div class="kuji-shimmer"></div>
    `;

    // Front face
    const front = document.createElement("div");
    front.className = "kuji-card-face kuji-card-front";
    front.style.background = `linear-gradient(135deg, ${meta.color}18, ${meta.bg})`;
    front.style.border = `1px solid ${meta.color}`;

    const imgHtml = item.imageUrl
      ? `<img class="kuji-img" src="${item.imageUrl}" alt="${item.name}"/>`
      : `<div class="kuji-no-img" style="background:rgba(0,0,0,.2)">🎁</div>`;

    front.innerHTML = `
      <div class="grade-badge" style="background:${meta.color}">${item.grade}</div>
      ${imgHtml}
      <div class="kuji-card-info">
        <div class="kuji-card-name" style="color:${meta.color}">${item.name}</div>
        ${item.description ? `<div class="kuji-card-desc">${item.description}</div>` : ""}
      </div>
    `;

    inner.appendChild(back);
    inner.appendChild(front);
    wrap.appendChild(inner);
    grid.appendChild(wrap);

    // Flip animation
    setTimeout(() => {
      inner.classList.add("flipped");
      setTimeout(() => {
        wrap.classList.add(meta.glow);
        front.classList.add("popped");
      }, 600);
    }, i * 150);
  });

  // Result tags
  const tags = document.getElementById("result-tags");
  tags.innerHTML = "";
  Object.entries(GRADE_META).forEach(([g, m]) => {
    const cnt = items.filter(r => r.grade === g).length;
    if (!cnt) return;
    const tag = document.createElement("span");
    tag.className = "result-tag";
    tag.style.cssText = `background:${m.color}22;border:1px solid ${m.color};color:${m.color}`;
    tag.textContent = `${g} ×${cnt}`;
    tags.appendChild(tag);
  });
}

// ── Collection ──
function renderCollectionTab() {
  const count = userDraws.length;
  document.getElementById("col-count").textContent = `총 ${count}개 보유`;
  const empty = document.getElementById("col-empty");
  const content = document.getElementById("col-content");

  if (count === 0) {
    empty.style.display = "";
    content.style.display = "none";
    return;
  }
  empty.style.display = "none";
  content.style.display = "";

  // Stats
  const stats = document.getElementById("col-stats");
  stats.innerHTML = "";
  Object.entries(GRADE_META).forEach(([g, m]) => {
    const cnt = userDraws.filter(d => d.grade === g).length;
    if (!cnt) return;
    const el = document.createElement("div");
    el.className = "col-stat-tag";
    el.style.cssText = `background:${m.color}18;border:1px solid ${m.color};color:${m.color}`;
    el.textContent = `${g}: ${cnt}개`;
    stats.appendChild(el);
  });

  // Grid
  const grid = document.getElementById("col-grid");
  grid.innerHTML = "";
  userDraws.forEach(item => {
    const meta = GRADE_META[item.grade] || GRADE_META.N;
    const el = document.createElement("div");
    el.className = "col-item";
    el.style.border = `1px solid ${meta.color}44`;
    const imgHtml = item.imageUrl
      ? `<img class="col-item-img" src="${item.imageUrl}" alt="${item.name}"/>`
      : `<div class="col-item-no-img" style="background:${meta.color}18">🎁</div>`;
    el.innerHTML = `
      ${imgHtml}
      <div class="col-item-body">
        <div class="col-item-grade" style="color:${meta.color}">${item.grade}</div>
        <div class="col-item-name">${item.name}</div>
      </div>
    `;
    grid.appendChild(el);
  });
}

// ── Reset ──
async function handleReset() {
  if (!confirm("정말 초기화할까요? 모든 뽑기 기록과 재고가 초기화돼요.")) return;
  try {
    const pDocs = await getDocs(collection(db, "products"));
    await Promise.all(pDocs.docs.map(d => updateDoc(doc(db, "products", d.id), { remaining: d.data().count })));
    const uItems = await getDocs(collection(db, "draws", userId, "items"));
    await Promise.all(uItems.docs.map(d => deleteDoc(doc(db, "draws", userId, "items", d.id))));
    await loadAll();
    renderDrawTab();
    document.getElementById("results-area").style.display = "none";
    alert("초기화 완료!");
  } catch (e) {
    console.error("handleReset error:", e);
    alert("초기화에 실패했어요.\n사유: " + (e && e.message ? e.message : e));
  }
}

// ── Save settings ──
async function saveSettings() {
  settings.title = document.getElementById("s-title").value;
  settings.subtitle = document.getElementById("s-subtitle").value;
  settings.maxPerUser = parseInt(document.getElementById("s-max").value) || 0;
  try {
    await setDoc(doc(db, "settings", "global"), settings);
    renderDrawTab();
    alert("저장됐어요!");
  } catch (e) {
    console.error("saveSettings error:", e);
    alert("설정 저장에 실패했어요.\n사유: " + (e && e.message ? e.message : e));
  }
}

// ── Image upload ──
async function handleImageUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const btn = document.getElementById("upload-btn");
  btn.textContent = "업로드 중...";
  btn.disabled = true;
  try {
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", PRESET);
    const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`, { method: "POST", body: fd });
    const d = await r.json();
    currentImageUrl = d.secure_url;
    const preview = document.getElementById("img-preview");
    preview.src = currentImageUrl;
    preview.style.display = "";
    document.getElementById("del-img-btn").style.display = "";
  } catch { alert("업로드 실패"); }
  btn.textContent = "이미지 선택";
  btn.disabled = false;
}
function clearImage() {
  currentImageUrl = "";
  document.getElementById("img-preview").style.display = "none";
  document.getElementById("del-img-btn").style.display = "none";
  document.getElementById("file-input").value = "";
}

// ── Save product ──
async function saveProduct() {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { alert("상품명을 입력하세요"); return; }
  const data = {
    name,
    grade: document.getElementById("f-grade").value,
    rate: Number(document.getElementById("f-rate").value) || 10,
    count: Number(document.getElementById("f-count").value) || 100,
    description: document.getElementById("f-desc").value,
    imageUrl: currentImageUrl
  };
  const saveBtn = document.querySelector("#tab-admin .admin-card:nth-child(2) .save-btn");
  const originalLabel = saveBtn ? saveBtn.textContent : "";
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = "저장 중..."; }
  try {
    if (editId) {
      await updateDoc(doc(db, "products", editId), data);
    } else {
      await addDoc(collection(db, "products"), { ...data, remaining: data.count });
    }
    cancelEdit();
    await loadAll();
    renderAdminTab();
    renderDrawTab();
  } catch (e) {
    console.error("saveProduct error:", e);
    alert("상품 저장에 실패했어요.\n사유: " + (e && e.message ? e.message : e) + "\n\nFirestore 보안 규칙에서 products 쓰기 권한을 확인해주세요.");
  } finally {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = originalLabel || (editId ? "수정 완료" : "상품 추가"); }
  }
}

function cancelEdit() {
  editId = null;
  currentImageUrl = "";
  document.getElementById("f-name").value = "";
  document.getElementById("f-grade").value = "R";
  document.getElementById("f-rate").value = "10";
  document.getElementById("f-count").value = "100";
  document.getElementById("f-desc").value = "";
  document.getElementById("img-preview").style.display = "none";
  document.getElementById("del-img-btn").style.display = "none";
  document.getElementById("file-input").value = "";
  document.getElementById("form-title").textContent = "➕ 상품 추가";
  const saveBtn = document.querySelector("#tab-admin .admin-card:nth-child(2) .save-btn");
  if (saveBtn) saveBtn.textContent = "상품 추가";
  document.getElementById("cancel-edit-btn").style.display = "none";
}

function editProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  editId = id;
  currentImageUrl = p.imageUrl || "";
  document.getElementById("f-name").value = p.name;
  document.getElementById("f-grade").value = p.grade;
  document.getElementById("f-rate").value = p.rate;
  document.getElementById("f-count").value = p.count;
  document.getElementById("f-desc").value = p.description || "";
  const preview = document.getElementById("img-preview");
  if (p.imageUrl) { preview.src = p.imageUrl; preview.style.display = ""; document.getElementById("del-img-btn").style.display = ""; }
  else { preview.style.display = "none"; document.getElementById("del-img-btn").style.display = "none"; }
  document.getElementById("form-title").textContent = "✏️ 상품 수정";
  const saveBtn = document.querySelector("#tab-admin .save-btn");
  if (saveBtn) saveBtn.textContent = "수정 완료";
  document.getElementById("cancel-edit-btn").style.display = "";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function deleteProduct(id) {
  if (!confirm("삭제할까요?")) return;
  try {
    await deleteDoc(doc(db, "products", id));
    await loadAll();
    renderAdminTab();
    renderDrawTab();
  } catch (e) {
    console.error("deleteProduct error:", e);
    alert("상품 삭제에 실패했어요.\n사유: " + (e && e.message ? e.message : e));
  }
}

// ── Render admin ──
function renderAdminTab() {
  const list = document.getElementById("product-list");
  document.getElementById("product-count").textContent = products.length;
  if (!products.length) {
    list.innerHTML = `<div style="color:var(--sub);text-align:center;padding:20px">상품을 추가해주세요</div>`;
    return;
  }
  list.innerHTML = "";
  products.forEach(p => {
    const meta = GRADE_META[p.grade] || GRADE_META.N;
    const el = document.createElement("div");
    el.className = "product-item";
    el.style.border = `1px solid ${meta.color}33`;
    const imgHtml = p.imageUrl
      ? `<img class="product-thumb" src="${p.imageUrl}" alt="${p.name}"/>`
      : `<div class="product-no-thumb" style="background:${meta.color}22">🎁</div>`;
    el.innerHTML = `
      ${imgHtml}
      <div class="product-info">
        <div class="product-name-row">
          <span class="product-grade-badge" style="color:${meta.color};background:${meta.color}22">${p.grade}</span>
          <span class="product-name">${p.name}</span>
        </div>
        <div class="product-meta">가중치 ${p.rate} · 재고 ${p.remaining ?? p.count}/${p.count}</div>
      </div>
      <div class="product-actions">
        <button class="edit-btn" onclick="editProduct('${p.id}')">수정</button>
        <button class="del-btn" onclick="deleteProduct('${p.id}')">삭제</button>
      </div>
    `;
    list.appendChild(el);
  });
}

// ── Confetti ──
function launchConfetti() {
  const container = document.getElementById("confetti-container");
  container.innerHTML = "";
  const colors = ["#38BDF8","#22D3EE","#FFD700","#60A5FA","#34D399"];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement("div");
    const size = 6 + Math.random() * 8;
    el.style.cssText = `
      position:absolute;
      left:${Math.random()*100}%;
      top:-10px;
      width:${size}px;height:${size}px;
      border-radius:2px;
      background:${colors[i % 5]};
      animation:confettiFall ${1.5+Math.random()}s ${Math.random()*1.5}s ease-in forwards;
    `;
    container.appendChild(el);
  }
  setTimeout(() => { container.innerHTML = ""; }, 4000);
}
</script>
