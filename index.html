<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUJI</title>

<style>
{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0f0f14;
color:#fff;
text-align:center;
}

/ 버튼 /
button{
border:0;
padding:14px 20px;
border-radius:16px;
font-weight:700;
cursor:pointer;
}

/ DRAW /
.draw{
width:160px;
height:160px;
border-radius:50%;
background:linear-gradient(135deg,#ff7ad9,#8b5cff);
font-size:24px;
margin-top:30px;
}

/ 결과 팝업 /
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

.popup{
background:#1b1b25;
padding:30px;
border-radius:20px;
animation:pop .4s ease;
}

@keyframes pop{
0%{transform:scale(.5);opacity:0}
100%{transform:scale(1);opacity:1}
}

.popup img{
width:180px;
border-radius:12px;
margin:15px 0;
}

/ 관리자 /
.admin{
display:none;
margin-top:30px;
}

input{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

/ 리스트 */
.item{
background:#1b1b25;
padding:10px;
margin:10px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>🎯 KUJI</h1>

<button class="draw" onclick="draw()">DRAW</button>

<!-- 결과 -->
<div class="overlay" id="overlay">
<div class="popup">
<h2 id="resultRank"></h2>
<img id="resultImg">
<p id="resultName"></p>
<button onclick="closePopup()">닫기</button>
</div>
</div>

<!-- 관리자 로그인 -->
<div>
<input type="password" id="pw" placeholder="관리자 비밀번호">
<button onclick="login()">관리</button>
</div>

<!-- 관리자 -->
<div class="admin" id="admin">
<h2>상품 추가</h2>

<input id="name" placeholder="상품 이름">
<input id="rank" placeholder="등급 (A/B/C)">
<input type="file" id="img">
<br>
<button onclick="add()">추가</button>

<div id="list"></div>
</div>

<script>
let items = JSON.parse(localStorage.getItem("items")||"[]")

function save(){
localStorage.setItem("items",JSON.stringify(items))
}

function render(){
let html=""
items.forEach((i,idx)=>{
html+= <div class="item"> ${i.rank} - ${i.name} <button onclick="del(${idx})">삭제</button> </div>
})
document.getElementById("list").innerHTML=html
}

function add(){
let name=document.getElementById("name").value
let rank=document.getElementById("rank").value
let file=document.getElementById("img").files[0]

let reader=new FileReader()
reader.onload=function(){
items.push({
name,
rank,
img:reader.result
})
save()
render()
}
reader.readAsDataURL(file)
}

function del(i){
items.splice(i,1)
save()
render()
}

function login(){
let pw=document.getElementById("pw").value
if(pw==="1230"){
document.getElementById("admin").style.display="block"
render()
}else{
alert("비번 틀림")
}
}

function draw(){
if(items.length===0){
alert("상품 없음")
return
}

let btn=document.querySelector(".draw")
btn.innerText="..."
btn.disabled=true

setTimeout(()=>{
let pick=items[Math.floor(Math.random()*items.length)]

document.getElementById("resultRank").innerText=pick.rank+" 당첨!"
document.getElementById("resultName").innerText=pick.name
document.getElementById("resultImg").src=pick.img

document.getElementById("overlay").style.display="flex"

btn.innerText="DRAW"
btn.disabled=false
},800)
}

function closePopup(){
document.getElementById("overlay").style.display="none"
}
</script>

</body>
</html>
