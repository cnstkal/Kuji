<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCKY KUJI ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
:root {
  --pink:    #ff6eb4;
  --pink2:   #ff9fd2;
  --yellow:  #ffe066;
  --yellow2: #fff3a3;
  --mint:    #5ee8c8;
  --lavender:#c4b5fd;
  --sky:     #7dd3fc;
  --coral:   #ff8c6b;
  --white:   #ffffff;
  --bg:      #F8F9FA;
  --card:    #ffffff;
  --text:    #2d2235;
  --muted:   #9b8aaa;
  --border:  #f0e0f5;
  --shadow:  rgba(200,100,180,0.13);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#fce4f5;}
::-webkit-scrollbar-thumb{background:var(--pink2);border-radius:10px;}

body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle 500px at 10% 20%,rgba(255,110,180,.12),transparent),
    radial-gradient(circle 400px at 90% 10%,rgba(94,232,200,.1),transparent),
    radial-gradient(circle 600px at 60% 80%,rgba(255,224,102,.1),transparent),
    radial-gradient(circle 350px at 5% 80%,rgba(196,181,253,.13),transparent);
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(255,248,240,.9);backdrop-filter:blur(18px);
  border-bottom:2.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:64px;
}
.nav-logo{
  font-family:'Black Han Sans',sans-serif;font-size:1.3rem;letter-spacing:2px;
  background:linear-gradient(120deg,var(--pink),var(--lavender),var(--mint));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.nav-links{display:flex;align-items:center;gap:1rem;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.82rem;font-weight:800;transition:.2s;}
.nav-links a:hover{color:var(--pink);}
.nav-admin-btn{
  background:linear-gradient(135deg,var(--pink),var(--lavender));
  border:none;color:#fff;padding:8px 20px;border-radius:50px;
  font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:800;
  cursor:pointer;box-shadow:0 4px 14px rgba(255,110,180,.35);transition:all .2s;
}
.nav-admin-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,110,180,.45);}

/* FLOATING DECOS */
.deco{position:fixed;pointer-events:none;font-size:2rem;animation:floaty 4s ease-in-out infinite alternate;opacity:.4;z-index:0;}
@keyframes floaty{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-18px) rotate(5deg)}}

/* HERO */
#draw{
  position:relative;z-index:1;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:80px 2rem 5rem;text-align:center;
}
.hero-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--yellow),var(--yellow2));
  color:var(--text);font-size:.75rem;font-weight:900;letter-spacing:2px;text-transform:uppercase;
  padding:6px 18px;border-radius:50px;margin-bottom:1.2rem;
  box-shadow:0 4px 12px rgba(255,220,80,.4);
  animation:popIn .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}

.hero-title{
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(2.8rem,7vw,5.5rem);line-height:1.05;
  background:linear-gradient(135deg,var(--pink) 0%,var(--lavender) 50%,var(--mint) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 4px 0 rgba(255,110,180,.15));
  margin-bottom:.6rem;
  animation:slideUp .7s .1s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}

.hero-sub{font-size:1.1rem;color:var(--muted);font-weight:700;margin-bottom:2rem;animation:slideUp .7s .2s cubic-bezier(.34,1.56,.64,1) both;}

.count-pill{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--white);border:2.5px solid var(--border);
  border-radius:50px;padding:10px 24px;
  font-size:.88rem;font-weight:800;color:var(--muted);
  margin-bottom:2.5rem;box-shadow:0 4px 16px var(--shadow);
  animation:slideUp .7s .3s cubic-bezier(.34,1.56,.64,1) both;
}
.count-pill strong{color:var(--pink);}

.draw-wrap{position:relative;animation:slideUp .7s .4s cubic-bezier(.34,1.56,.64,1) both;}
.draw-btn{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--pink) 0%,var(--coral) 100%);
  border:none;color:#fff;
  padding:22px 70px;border-radius:100px;
  font-family:'Black Han Sans',sans-serif;font-size:1.8rem;letter-spacing:4px;
  cursor:pointer;
  box-shadow:0 8px 30px rgba(255,110,180,.5),0 2px 0 rgba(255,255,255,.25) inset;
  transition:all .3s;
  animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 8px 30px rgba(255,110,180,.5),0 0 0 0 rgba(255,110,180,.3);}
  50%{box-shadow:0 8px 30px rgba(255,110,180,.5),0 0 0 14px rgba(255,110,180,.0);}
}
.draw-btn::before{
  content:'';position:absolute;top:-50%;left:-60%;
  width:40%;height:200%;background:rgba(255,255,255,.3);
  transform:skewX(-20deg);animation:shine 3s ease-in-out infinite;
}
@keyframes shine{0%,100%{left:-60%}50%{left:150%}}
.draw-btn:hover{transform:translateY(-4px) scale(1.04);box-shadow:0 14px 40px rgba(255,110,180,.6);animation:none;}
.draw-btn:active{transform:translateY(0) scale(.98);}

.draw-note{margin-top:1rem;color:var(--muted);font-size:.82rem;font-weight:700;}
.draw-note strong{color:var(--pink);}

.grade-summary{margin-top:3rem;width:100%;max-width:680px;animation:slideUp .7s .5s cubic-bezier(.34,1.56,.64,1) both;}
.grade-summary-label{font-size:.72rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem;}
.grade-pills{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;}
.grade-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--white);border:2.5px solid var(--border);
  border-radius:50px;padding:7px 16px;
  font-size:.78rem;font-weight:800;box-shadow:0 2px 8px var(--shadow);
}
.gp-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.gp-count{color:var(--pink);font-weight:900;}

/* PRIZES */
#prizes{position:relative;z-index:1;padding:3rem 2rem 4rem;max-width:1200px;margin:0 auto;}
.section-header{text-align:center;margin-bottom:2.5rem;}
.section-tag{
  display:inline-block;
  background:linear-gradient(135deg,var(--mint),var(--sky));
  color:var(--text);font-size:.7rem;font-weight:900;
  letter-spacing:2px;text-transform:uppercase;
  padding:5px 14px;border-radius:50px;margin-bottom:.6rem;
}
.section-title{
  font-family:'Black Han Sans',sans-serif;font-size:2rem;
  background:linear-gradient(135deg,var(--text),var(--muted));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.prizes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1.2rem;}
.prize-card{
  background:var(--white);border:2.5px solid var(--border);
  border-radius:22px;overflow:hidden;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  position:relative;box-shadow:0 4px 16px var(--shadow);
}
.prize-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 12px 32px rgba(255,110,180,.2);border-color:var(--pink2);}
.prize-img-wrap{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.prize-img-wrap img{width:100%;height:100%;object-fit:cover;}
.prize-img-wrap .no-img{font-size:3.5rem;}
.prize-info{padding:1rem 1.1rem 1.1rem;}
.prize-badge{display:inline-block;padding:3px 12px;border-radius:50px;font-size:.68rem;font-weight:900;letter-spacing:1px;margin-bottom:.5rem;}
.prize-name{font-weight:900;font-size:.95rem;margin-bottom:.3rem;color:var(--text);}
.prize-desc{font-size:.76rem;color:var(--muted);margin-bottom:.55rem;line-height:1.5;}
.prize-foot{display:flex;justify-content:space-between;align-items:center;font-size:.73rem;}
.prize-qty{background:var(--bg);border-radius:50px;padding:3px 10px;font-weight:800;color:var(--muted);}
.prize-weight{color:var(--pink);font-weight:800;}
.sold-overlay{position:absolute;inset:0;background:rgba(255,248,240,.82);display:flex;align-items:center;justify-content:center;}
.sold-tag{background:var(--muted);color:#fff;font-size:.8rem;font-weight:900;letter-spacing:2px;padding:8px 20px;border-radius:50px;}

/* HISTORY */
#history-section{position:relative;z-index:1;padding:2rem 2rem 5rem;max-width:680px;margin:0 auto;}
.history-list{display:flex;flex-direction:column;gap:.7rem;}
.history-item{
  background:var(--white);border:2.5px solid var(--border);
  border-radius:16px;padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 10px var(--shadow);
  animation:slideDown .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
.history-item img,.hi-icon{
  width:46px;height:46px;border-radius:12px;object-fit:cover;
  background:var(--bg);display:flex;align-items:center;
  justify-content:center;font-size:1.5rem;flex-shrink:0;border:2px solid var(--border);
}
.hi-info{flex:1;}
.hi-name{font-weight:900;font-size:.9rem;color:var(--text);}
.hi-time{font-size:.72rem;color:var(--muted);margin-top:1px;}
.hi-badge{padding:4px 12px;border-radius:50px;font-size:.7rem;font-weight:900;flex-shrink:0;}

/* EMPTY */
.empty-state{text-align:center;padding:3.5rem 2rem;color:var(--muted);}
.empty-state .e-icon{font-size:3.5rem;margin-bottom:.8rem;}
.empty-state p{font-size:.88rem;font-weight:700;line-height:1.6;}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(45,34,53,.45);backdrop-filter:blur(10px);
  align-items:center;justify-content:center;padding:1rem;
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--white);border:2.5px solid var(--border);
  border-radius:28px;padding:2rem;
  width:100%;max-width:500px;max-height:90vh;overflow-y:auto;
  position:relative;box-shadow:0 20px 60px rgba(200,100,180,.25);
  animation:modalIn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.modal-title{font-family:'Black Han Sans',sans-serif;font-size:1.3rem;background:linear-gradient(135deg,var(--pink),var(--lavender));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.modal-close{
  background:var(--bg);border:2px solid var(--border);
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;cursor:pointer;color:var(--muted);transition:.2s;
}
.modal-close:hover{background:var(--pink);color:#fff;border-color:var(--pink);}

.form-group{margin-bottom:1.1rem;}
.form-label{display:block;font-size:.75rem;font-weight:900;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.form-control{
  width:100%;background:var(--bg);border:2px solid var(--border);border-radius:14px;
  color:var(--text);padding:10px 14px;
  font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;transition:.2s;
}
.form-control:focus{outline:none;border-color:var(--pink);background:#fff;}
textarea.form-control{resize:vertical;min-height:68px;}

.img-upload-area{
  border:2.5px dashed var(--pink2);border-radius:16px;
  padding:1.5rem;text-align:center;cursor:pointer;
  transition:.2s;position:relative;background:var(--bg);
}
.img-upload-area:hover{border-color:var(--pink);background:#fff5fb;}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-upload-area .ua-icon{font-size:2rem;margin-bottom:.4rem;}
.img-upload-area p{font-size:.82rem;font-weight:700;color:var(--muted);}
.img-upload-area small{font-size:.72rem;color:var(--pink2);}
.img-preview-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.img-preview-item{position:relative;width:60px;height:60px;}
.img-preview-item img{width:100%;height:100%;object-fit:cover;border-radius:10px;border:2px solid var(--border);}
.img-preview-item .rm-btn{
  position:absolute;top:-5px;right:-5px;
  width:20px;height:20px;border-radius:50%;
  background:var(--pink);border:2px solid #fff;color:#fff;
  font-size:.7rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-weight:900;
}

.grade-grid{display:flex;flex-wrap:wrap;gap:7px;}
.grade-radio{display:none;}
.grade-radio+label{
  padding:6px 14px;border-radius:50px;border:2px solid var(--border);
  background:var(--bg);font-size:.75rem;font-weight:900;cursor:pointer;
  color:var(--muted);transition:.2s;
}
.grade-radio:checked+label{
  background:linear-gradient(135deg,var(--pink),var(--lavender));
  border-color:transparent;color:#fff;
  box-shadow:0 4px 12px rgba(255,110,180,.4);
}

.btn-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1.3rem;}
.btn{flex:1;padding:12px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:900;cursor:pointer;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--coral));color:#fff;box-shadow:0 4px 14px rgba(255,110,180,.4);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,110,180,.5);}
.btn-secondary{background:var(--bg);color:var(--muted);border:2px solid var(--border);}
.btn-secondary:hover{color:var(--text);border-color:var(--muted);}
.btn-danger{background:#fff0f0;color:#e74c3c;border:2px solid #ffd0d0;}
.btn-danger:hover{background:#ffe0e0;}

.manage-list{display:flex;flex-direction:column;gap:.5rem;margin-top:.8rem;}
.manage-item{background:var(--bg);border:2px solid var(--border);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;}
.manage-item img,.mi-icon{width:42px;height:42px;border-radius:10px;object-fit:cover;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.mi-info{flex:1;min-width:0;}
.mi-name{font-size:.85rem;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mi-meta{font-size:.72rem;color:var(--muted);margin-top:1px;}
.mi-del{background:#fff0f0;color:#e74c3c;border:2px solid #ffd0d0;border-radius:8px;padding:4px 10px;font-size:.72rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0;transition:.2s;}
.mi-del:hover{background:#ffd0d0;}

#resultModal .modal{max-width:380px;text-align:center;}
.result-badge{display:inline-block;padding:5px 18px;border-radius:50px;font-size:.75rem;font-weight:900;letter-spacing:2px;margin-bottom:1rem;}
.result-img{width:170px;height:170px;border-radius:20px;object-fit:cover;margin:0 auto 1.2rem;display:block;border:3px solid var(--border);box-shadow:0 8px 24px rgba(255,110,180,.2);}
.result-icon{width:170px;height:170px;border-radius:20px;margin:0 auto 1.2rem;background:var(--bg);border:3px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:5rem;}
.result-name{font-family:'Black Han Sans',sans-serif;font-size:1.6rem;margin-bottom:.4rem;color:var(--text);}
.result-desc{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6;}
.result-again{background:var(--bg);border:2px solid var(--border);color:var(--muted);border-radius:14px;padding:11px;width:100%;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:900;cursor:pointer;margin-top:.6rem;transition:.2s;}
.result-again:hover{border-color:var(--pink);color:var(--pink);}

#confetti-canvas{position:fixed;inset:0;z-index:9999;pointer-events:none;}

.section-divider{position:relative;z-index:1;text-align:center;padding:1rem 0;font-size:1.5rem;letter-spacing:8px;color:var(--pink2);}

footer{position:relative;z-index:1;text-align:center;padding:2rem;font-size:.75rem;font-weight:700;color:var(--muted);border-top:2.5px solid var(--border);margin-top:2rem;}

/* Grade colors */
.gc-A{background:linear-gradient(135deg,#FFD700,#FFA500);color:#5a3a00;}
.gc-B{background:linear-gradient(135deg,#d4d4d4,#a0a0a0);color:#3a3a3a;}
.gc-C{background:linear-gradient(135deg,#f0b890,#c07040);color:#fff;}
.gc-D{background:linear-gradient(135deg,#93c5fd,#3b82f6);color:#fff;}
.gc-E{background:linear-gradient(135deg,#86efac,#22c55e);color:#fff;}
.gc-미스터리{background:linear-gradient(135deg,var(--lavender),#8b5cf6);color:#fff;}
.gc-디지털{background:linear-gradient(135deg,var(--mint),#0891b2);color:#fff;}

.dot-A{background:#FFD700;}
.dot-B{background:#a0a0a0;}
.dot-C{background:#c07040;}
.dot-D{background:#3b82f6;}
.dot-E{background:#22c55e;}
.dot-미스터리{background:#8b5cf6;}
.dot-디지털{background:#0891b2;}

.ct-A{background:linear-gradient(180deg,#fffbe8 0%,#fff 60%);}
.ct-B{background:linear-gradient(180deg,#f5f5f5 0%,#fff 60%);}
.ct-C{background:linear-gradient(180deg,#fff3ea 0%,#fff 60%);}
.ct-D{background:linear-gradient(180deg,#eff6ff 0%,#fff 60%);}
.ct-E{background:linear-gradient(180deg,#f0fdf4 0%,#fff 60%);}
.ct-미스터리{background:linear-gradient(180deg,#faf5ff 0%,#fff 60%);}
.ct-디지털{background:linear-gradient(180deg,#ecfdf5 0%,#fff 60%);}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div class="deco" style="top:15%;left:5%;animation-delay:.5s">🌸</div>
<div class="deco" style="top:30%;right:4%;animation-delay:1s;font-size:1.4rem">⭐</div>
<div class="deco" style="top:58%;left:3%;animation-delay:1.8s;font-size:1.2rem">💫</div>
<div class="deco" style="top:72%;right:5%;animation-delay:.3s">🎀</div>

<nav>
  <div class="nav-logo">✦ LUCKY KUJI</div>
  <div class="nav-links">
    <a href="#draw">뽑기</a>
    <a href="#prizes">상품</a>
    <button class="nav-admin-btn" onclick="openAdmin()">🛠 관리자</button>
  </div>
</nav>

<section id="draw">
  <div class="hero-chip">🎊 LUCKY KUJI · 오늘의 운</div>
  <h1 class="hero-title">굿즈를 뽑아봐요!</h1>
  <p class="hero-sub">과연 어떤 굿즈가 나올까? 두근두근 🫶</p>
  <div class="count-pill">🎁 등록된 상품 <strong id="totalCount">0</strong>개</div>
  <div class="draw-wrap">
    <button class="draw-btn" onclick="drawPrize()">🪙 DRAW!</button>
  </div>
  <p class="draw-note">총 <strong id="availableCount">0</strong>개 중 랜덤 뽑기</p>
  <div class="grade-summary">
    <p class="grade-summary-label">✦ 등급별 보유 수량</p>
    <div class="grade-pills" id="gradePills"></div>
  </div>
</section>

<div class="section-divider">· · ✦ · ·</div>

<section id="prizes">
  <div class="section-header">
    <div class="section-tag">🎀 PRIZE LINEUP</div>
    <h2 class="section-title">상품 라인업</h2>
  </div>
  <div class="prizes-grid" id="prizesGrid"></div>
</section>

<div class="section-divider">· · ✦ · ·</div>

<section id="history-section">
  <div class="section-header">
    <div class="section-tag">📜 DRAW HISTORY</div>
    <h2 class="section-title">최근 당첨 내역</h2>
  </div>
  <div class="history-list" id="historyList"></div>
</section>

<footer>✦ LUCKY KUJI — 오늘도 행운 가득한 하루 되세요 🍀 ✦</footer>

<!-- ADMIN MODAL -->
<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">🛠 상품 관리</span>
      <button class="modal-close" onclick="closeAdmin()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">상품 이미지 (무제한)</label>
      <div class="img-upload-area">
        <input type="file" id="imgInput" accept="image/*" multiple onchange="handleImg(event)">
        <div class="ua-icon">📷</div>
        <p>클릭하여 이미지 추가</p>
        <small>여러 장 동시 선택 가능 · 장 수 제한 없음</small>
      </div>
      <div class="img-preview-list" id="imgPreviewList"></div>
    </div>
    <div class="form-group">
      <label class="form-label">등급</label>
      <div class="grade-grid">
        <input type="radio" name="grade" id="gA" value="A" class="grade-radio" checked><label for="gA">🥇 A상</label>
        <input type="radio" name="grade" id="gB" value="B" class="grade-radio"><label for="gB">🥈 B상</label>
        <input type="radio" name="grade" id="gC" value="C" class="grade-radio"><label for="gC">🥉 C상</label>
        <input type="radio" name="grade" id="gD" value="D" class="grade-radio"><label for="gD">💙 D상</label>
        <input type="radio" name="grade" id="gE" value="E" class="grade-radio"><label for="gE">💚 E상</label>
        <input type="radio" name="grade" id="gM" value="미스터리" class="grade-radio"><label for="gM">🔮 미스터리상</label>
        <input type="radio" name="grade" id="gDG" value="디지털" class="grade-radio"><label for="gDG">💻 디지털상</label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">상품명</label>
      <input type="text" id="prizeName" class="form-control" placeholder="예: 한정판 아크릴 스탠드">
    </div>
    <div class="form-group">
      <label class="form-label">상품 설명</label>
      <textarea id="prizeDesc" class="form-control" placeholder="상품 설명을 입력하세요"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">
      <div class="form-group">
        <label class="form-label">수량</label>
        <input type="number" id="prizeQty" class="form-control" value="1" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">확률 가중치</label>
        <input type="number" id="prizeWeight" class="form-control" value="1" min="1">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="savePrize()">✅ 저장</button>
      <button class="btn btn-secondary" onclick="resetForm()">↩ 초기화</button>
      <button class="btn btn-danger" onclick="clearAll()">🗑 전체 삭제</button>
    </div>
    <div style="margin-top:1.5rem">
      <p style="font-size:.72rem;font-weight:900;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem">📋 등록된 상품 목록</p>
      <div class="manage-list" id="manageList"></div>
    </div>
  </div>
</div>

<!-- RESULT MODAL -->
<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <button class="modal-close" onclick="closeResult()" style="position:absolute;top:1rem;right:1rem">×</button>
    <div id="resultContent"></div>
    <button class="btn btn-primary" onclick="closeResult()" style="width:100%;margin-top:.5rem">🎉 확인!</button>
    <button class="result-again" onclick="closeResult();drawPrize()">한 번 더 뽑기 🎲</button>
  </div>
</div>

<script>
const PK='luckyKuji_v3_prizes', HK='luckyKuji_v3_history';
let prizes=[], history=[], pendingImgs=[];
const EMOJI={A:'🥇',B:'🥈',C:'🥉',D:'💙',E:'💚','미스터리':'🔮','디지털':'💻'};
const GRADES=['A','B','C','D','E','미스터리','디지털'];

function load(){
  try{prizes=JSON.parse(localStorage.getItem(PK)||'[]');}catch{prizes=[];}
  try{history=JSON.parse(localStorage.getItem(HK)||'[]');}catch{history=[];}
}
function save(){localStorage.setItem(PK,JSON.stringify(prizes));localStorage.setItem(HK,JSON.stringify(history));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){renderHero();renderPrizes();renderHistory();renderManage();}

function renderHero(){
  document.getElementById('totalCount').textContent=prizes.length;
  document.getElementById('availableCount').textContent=prizes.filter(p=>p.qty>0).length;
  const pills=document.getElementById('gradePills');
  pills.innerHTML='';
  GRADES.forEach(g=>{
    const items=prizes.filter(p=>p.grade===g);
    if(!items.length)return;
    const qty=items.reduce((s,p)=>s+p.qty,0);
    pills.innerHTML+=`<div class="grade-pill"><div class="gp-dot dot-${g}"></div><span style="font-weight:900;font-size:.78rem">${g}상</span><span class="gp-count">${qty}</span></div>`;
  });
}

function renderPrizes(){
  const grid=document.getElementById('prizesGrid');
  if(!prizes.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="e-icon">🎁</div><p>등록된 상품이 없어요!<br>관리자에서 상품을 추가해보세요 🌟</p></div>`;return;
  }
  grid.innerHTML=prizes.map((p,i)=>{
    const g=p.grade;
    const img=p.images&&p.images.length?`<img src="${p.images[0]}" alt="${esc(p.name)}">`:`<div class="no-img">${EMOJI[g]||'🎁'}</div>`;
    const sold=p.qty<=0?`<div class="sold-overlay"><span class="sold-tag">SOLD OUT</span></div>`:'';
    return `<div class="prize-card ct-${g}">
      <div class="prize-img-wrap">${img}</div>
      <div class="prize-info">
        <div class="prize-badge gc-${g}">${g}상</div>
        <div class="prize-name">${esc(p.name)}</div>
        <div class="prize-desc">${esc(p.desc||'')}</div>
        <div class="prize-foot"><span class="prize-qty">수량 ${p.qty}</span><span class="prize-weight">×${p.weight}</span></div>
      </div>${sold}
    </div>`;
  }).join('');
}

function renderHistory(){
  const list=document.getElementById('historyList');
  if(!history.length){
    list.innerHTML=`<div class="empty-state"><div class="e-icon">🌟</div><p>아직 뽑기 기록이 없어요!<br>첫 번째 뽑기를 해보세요 🎲</p></div>`;return;
  }
  list.innerHTML=history.slice(0,30).map(h=>{
    const img=h.image?`<img src="${h.image}" alt="">`:`<div class="hi-icon">${EMOJI[h.grade]||'🎁'}</div>`;
    return `<div class="history-item">${img}<div class="hi-info"><div class="hi-name">${esc(h.name)}</div><div class="hi-time">${h.time}</div></div><span class="hi-badge gc-${h.grade}">${h.grade}상</span></div>`;
  }).join('');
}

function renderManage(){
  const list=document.getElementById('manageList');
  if(!prizes.length){list.innerHTML=`<p style="text-align:center;color:var(--muted);font-size:.8rem;padding:1rem">등록된 상품 없음</p>`;return;}
  list.innerHTML=prizes.map((p,i)=>{
    const img=p.images&&p.images.length?`<img src="${p.images[0]}" alt="">`:`<div class="mi-icon">${EMOJI[p.grade]||'🎁'}</div>`;
    return `<div class="manage-item">${img}<div class="mi-info"><div class="mi-name">${esc(p.name)}</div><div class="mi-meta">${p.grade}상 · 수량 ${p.qty} · 이미지 ${(p.images||[]).length}장</div></div><button class="mi-del" onclick="delPrize(${i})">삭제</button></div>`;
  }).join('');
}

function handleImg(e){
  Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>{pendingImgs.push(ev.target.result);renderPreviews();};r.readAsDataURL(f);});
  e.target.value='';
}
function renderPreviews(){
  document.getElementById('imgPreviewList').innerHTML=pendingImgs.map((d,i)=>
    `<div class="img-preview-item"><img src="${d}"><button class="rm-btn" onclick="rmImg(${i})">×</button></div>`).join('');
}
function rmImg(i){pendingImgs.splice(i,1);renderPreviews();}

function savePrize(){
  const name=document.getElementById('prizeName').value.trim();
  if(!name){alert('상품명을 입력해주세요!');return;}
  prizes.push({id:Date.now(),name,desc:document.getElementById('prizeDesc').value.trim(),
    qty:parseInt(document.getElementById('prizeQty').value)||0,
    weight:parseInt(document.getElementById('prizeWeight').value)||1,
    grade:document.querySelector('input[name="grade"]:checked').value,
    images:[...pendingImgs]});
  save();resetForm();render();
}
function resetForm(){
  ['prizeName','prizeDesc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('prizeQty').value=1;
  document.getElementById('prizeWeight').value=1;
  document.getElementById('gA').checked=true;
  pendingImgs=[];renderPreviews();
}
function delPrize(i){if(!confirm('삭제할까요?'))return;prizes.splice(i,1);save();render();}
function clearAll(){if(!confirm('모든 상품과 기록을 삭제할까요?'))return;prizes=[];history=[];save();render();}

function drawPrize(){
  const pool=prizes.filter(p=>p.qty>0);
  if(!pool.length){alert('뽑을 수 있는 상품이 없어요! 😢');return;}
  const tw=pool.reduce((s,p)=>s+p.weight,0);
  let rand=Math.random()*tw,chosen=null;
  for(const p of pool){rand-=p.weight;if(rand<=0){chosen=p;break;}}
  if(!chosen)chosen=pool[pool.length-1];
  const idx=prizes.findIndex(p=>p.id===chosen.id);
  if(idx!==-1)prizes[idx].qty--;
  const now=new Date();
  history.unshift({name:chosen.name,grade:chosen.grade,image:chosen.images?.[0]||null,
    time:`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`});
  if(history.length>100)history=history.slice(0,100);
  save();render();showResult(chosen);
}

function showResult(p){
  const img=p.images&&p.images.length?`<img class="result-img" src="${p.images[0]}" alt="">`:`<div class="result-icon">${EMOJI[p.grade]||'🎁'}</div>`;
  document.getElementById('resultContent').innerHTML=`
    <p style="font-size:2rem;margin-bottom:.4rem">🎊</p>
    <p style="font-size:.8rem;font-weight:900;color:var(--muted);letter-spacing:2px;margin-bottom:.6rem">당 첨 !</p>
    <div class="result-badge gc-${p.grade}" style="margin-bottom:1rem">${p.grade}상</div>
    ${img}
    <div class="result-name">${esc(p.name)}</div>
    <div class="result-desc">${esc(p.desc||'')}</div>`;
  document.getElementById('resultModal').classList.add('show');
  if(['A','미스터리'].includes(p.grade))launchConfetti();
}
function closeResult(){document.getElementById('resultModal').classList.remove('show');}
function openAdmin(){document.getElementById('adminModal').classList.add('show');renderManage();}
function closeAdmin(){document.getElementById('adminModal').classList.remove('show');}

['adminModal','resultModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
});

function launchConfetti(){
  const cv=document.getElementById('confetti-canvas');
  const ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const colors=['#ff6eb4','#ffe066','#5ee8c8','#c4b5fd','#ff8c6b','#93c5fd','#86efac','#fda4af'];
  const pieces=Array.from({length:160},()=>({
    x:Math.random()*cv.width,y:-10,
    r:3+Math.random()*6,vy:2+Math.random()*3,vx:(Math.random()-.5)*3,
    rot:Math.random()*360,rv:(Math.random()-.5)*5,
    color:colors[Math.floor(Math.random()*colors.length)],
    shape:Math.random()>.5?'circle':'rect'
  }));
  let raf;
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      else ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      ctx.restore();
      p.y+=p.vy;p.x+=p.vx;p.rot+=p.rv;
    });
    if(pieces.some(p=>p.y<cv.height))raf=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cv.width,cv.height);
  })();
  setTimeout(()=>{cancelAnimationFrame(raf);ctx.clearRect(0,0,cv.width,cv.height);},3500);
}

load();render();
</script>
</body>
</html>
